[pytest]

testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

minversion = 7.0

addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -ra

markers =
    integration: Integration method tests (quadrature, monte_carlo)
    quadrature: Gauss-Legendre quadrature tests
    monte_carlo: Monte Carlo sampling tests
    losses: Loss function tests
    models: Model interface and model builder tests
    LS: Least Square loss function tests
    PINN: PINN loss function tests
    slow: Slow tests (dimension scaling, high sample counts)

log_cli = false
log_file = tests/pytest.log
log_level = INFO
