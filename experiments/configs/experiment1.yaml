# ----------------
# Ensure the following lines are always part of the config
# ----------------
script_name: simple_wave
generate_data: true
make_plots: true

# ----------------
# Problem parameters
# ----------------
iterations: 5

problem_params:
  T: 1.0
  c: 1.0

training:
  epochs: 1000000
  max_training_time: 60.0
  learning_rate:
    kind: exponential_decay
    init_value: 1.0e-4
    transition_steps: 1000
    decay_rate: 0.95
    staircase: true
  seed: 42
  log_every: 100
  optimiser: "adamw"

integration:
  kind: "monte_carlo"
  spatial_dim: 1
  x_min: 0.0
  x_max: 1.0
  t_min: 0.0
  t_max: 1.0
  monte_carlo:
    interior_samples: 1600
    boundary_samples: 1000

models:
  - name: "mlp"
    hidden_dim: 64
    num_layers: 5
  # - name: "kan"
  #   hidden_dim: 64
  #   num_layers: 5
  #   input_dim: 2

methods:
  # - name: "pinn"
  #   output_heads:
  #     u: 1
  #   ic_weight: 1.0
  #   bc_weights: 100.0
  # - name: "sls"
  #   output_heads:
  #     v: 1
  #     sigma: 1
  # - name: "gpinn"
  #   output_heads:
  #     u: 1
  #   ic_weight: 1.0
  #   bc_weight: 100.0
  #   residual_grad_weight: 1e-2
  - name: "fosls"
    output_heads:
      v: 1
      sigma: 1
    ic_weight: 1.0
  # - name: "vpinn"
  #   output_heads:
  #     u: 1
  #   ic_weight: 1.0
  #   bc_weight: 100.0
  #   n_test_functions: 10

# ----------------
# Data analysis parameters
# ----------------

plot_params:
  t_grid: 100
  x_grid: 100

plot_loss:
  show_error: True
  error_low: 0 # percent
  error_high: 100 # percent
  size_windowed_average: 100 # In epochs

