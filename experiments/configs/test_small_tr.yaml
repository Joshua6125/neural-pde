# ----------------
# Ensure the following lines are always part of the config
# ----------------
script_name: simple_wave
generate_data: true
make_plots: false

# ----------------
# Problem parameters
# ----------------
iterations: 1

problem_params:
  T: 1.0
  c: 1.0

training:
  epochs: 200
  max_training_time: 20.0
  learning_rate:
    kind: constant
    init_value: 1.0e-4
  seed: 42
  log_every: 10
  optimiser: "adamw"
  convergence_check: False
  use_jit: True

integration:
  kind: "monte_carlo"
  spatial_dim: 1
  x_min: 0.0
  x_max: 1.0
  t_min: 0.0
  t_max: 1.0
  monte_carlo:
    interior_samples: 1000
    boundary_samples: 500

callback_integration:
  kind: "quadrature"
  spatial_dim: 1
  x_min: 0.0
  x_max: 1.0
  t_min: 0.0
  t_max: 1.0
  quadrature:
    degree: 10

combinations: [
  ["fosls", "mlp"],
]

models:
  mlp:
    hidden_dim: 16
    num_layers: 2

methods:
  fosls:
    output_heads:
      v: 1
      sigma: 1
    ic_weight: 1.0
