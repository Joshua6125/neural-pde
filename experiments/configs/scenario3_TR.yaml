# ----------------
# Ensure the following lines are always part of the config
# ----------------
script_name: non_matching_boundary
generate_data: true
make_plots: true

# ----------------
# Problem parameters
# ----------------
iterations: 10

problem_params:
  T: 1.0
  c: 1.0

training:
  epochs: 200000
  max_training_time: 1200.0
  learning_rate:
    kind: exponential_decay
    init_value: 1.0e-4
    transition_steps: 1000
    decay_rate: 0.95
    staircase: true
  seed: 42
  log_every: 500
  optimiser: "adamw"
  convergence_check: False
  use_jit: True

integration:
  kind: "monte_carlo"
  spatial_dim: 1
  x_min: 0.0
  x_max: 1.0
  t_min: 0.0
  t_max: 1.0
  monte_carlo:
    interior_samples: 20000
    boundary_samples: 2000

callback_integration:
  kind: "quadrature"
  spatial_dim: 1
  x_min: 0.0
  x_max: 1.0
  t_min: 0.0
  t_max: 1.0
  quadrature:
    degree: 5
    grid_size: 50

combinations: [
  # Should be [method, model]
  # ["pinn", "mlp"],
  # ["fosls", "mlp"],
  # ["vpinn", "mlp"],
  # ["pinn", "mlp_V0"],
  ["fosls", "mlp_V0"],
  ["vpinn", "mlp_V0"],
]

models:
  mlp:
    hidden_dim: 64
    num_layers: 5
  mlp_V0:
    hidden_dim: 64
    num_layers: 5

methods:
  pinn:
    output_heads:
      u: 1
    ic_weight: 1.0
    bc_weight: 100.0
  fosls:
    output_heads:
      v: 1
      sigma: 1
    ic_weight: 1.0
  vpinn:
    output_heads:
      u: 1
    ic_weight: 1.0
    bc_weight: 10.0
    n_test_functions: 400

# ----------------
# Data analysis parameters
# ----------------

plot_params:
  t_grid: 100
  x_grid: 100

plot_fosls_loss:
  show_error: True
  error_low: 0 # percent
  error_high: 100 # percent
  size_windowed_average: 100 # In epochs

plot_specific_t:
  show_error: True
  error_low: 0 # percent
  error_high: 100 # percent
