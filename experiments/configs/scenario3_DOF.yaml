# ----------------
# Ensure the following lines are always part of the config
# ----------------
script_name: non_matching_boundary_dof
generate_data: true
make_plots: true

# ----------------
# Problem parameters
# ----------------
iterations: 10

problem_params:
  T: 1.0
  c: 1.0

training:
  epochs: 200000
  max_training_time: 1200.0
  learning_rate:
    kind: exponential_decay
    init_value: 1.0e-4
    transition_steps: 1000
    decay_rate: 0.95
    staircase: true
  log_every: 2000
  seed: 42
  optimiser: "adamw"
  convergence_check: False
  use_jit: True

integration:
  kind: "monte_carlo"
  spatial_dim: 1
  x_min: 0.0
  x_max: 1.0
  t_min: 0.0
  t_max: 1.0
  monte_carlo:
    interior_samples: 20000
    boundary_samples: 2000

combinations: [
  # Should be [method, model]
  ["fosls", "mlp"],
]

models:
  mlp:
    - {hidden_dim: 8,    num_layers: 2}
    - {hidden_dim: 16,   num_layers: 2}
    - {hidden_dim: 16,   num_layers: 3}
    - {hidden_dim: 32,   num_layers: 3}
    - {hidden_dim: 32,   num_layers: 4}
    - {hidden_dim: 64,   num_layers: 4}
    - {hidden_dim: 64,   num_layers: 5}
    - {hidden_dim: 128,  num_layers: 5}
    - {hidden_dim: 256,  num_layers: 5}

methods:
  fosls:
    output_heads:
      v: 1
      sigma: 1
    ic_weight: 1.0

# ----------------
# Data analysis parameters
# ----------------

plot_integration:
  kind: "quadrature"
  spatial_dim: 1
  x_min: 0.0
  x_max: 1.0
  t_min: 0.0
  t_max: 1.0
  quadrature:
    degree: 5
    grid_size: 100

plot_loss:
  grid_resolution: 1000
  show_error: True
  error_low: 0 # percent
  error_high: 100 # percent
  show_fgk_results: True

plot_specific_t:
  show_error: True
  error_low: 0 # percent
  error_high: 100 # percent
