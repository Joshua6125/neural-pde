# Configuration for Experiment 1: Wave equation comparison
# Inherits from defaults.yaml; only override what's different

name: "experiment_1"
domain: "simple_wave_equation"

training:
  epochs: 5
  learning_rate:
    kind: exponential_decay
    init_value: 1.0e-3
    transition_steps: 1000
    decay_rate: 0.95
    staircase: true
  seed: 42
  log_every: 1
  optimiser: "adamw"

methods:
  - name: "sls"
    output_heads:
      v: 1
      sigma: 1

models:
  - name: "mlp"
    hidden_dim: 32
    num_layers: 3
  - name: "kan"
    hidden_dim: 32
    num_layers: 3
    input_dim: 2
  - name: "xnode"
    hidden_dim: 32
    num_layers: 1